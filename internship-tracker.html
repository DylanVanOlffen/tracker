<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100 Days</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1c1c1c;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.14);
    --text: #f0ede8;
    --muted: #666;
    --accent: #e8d5b0;
    --accent2: #c4a96d;
    --done-bg: #e8d5b0;
    --done-text: #0a0a0a;
    --ff-display: 'Bebas Neue', sans-serif;
    --ff-mono: 'DM Mono', monospace;
    --ff-body: 'DM Sans', sans-serif;
  }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: var(--ff-body);
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3rem 1.5rem 4rem;
    position: relative;
    overflow-x: hidden;
  }

  /* Subtle grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  /* Ambient glow */
  body::after {
    content: '';
    position: fixed;
    top: -20vh;
    left: 50%;
    transform: translateX(-50%);
    width: 60vw;
    height: 40vh;
    background: radial-gradient(ellipse, rgba(196,169,109,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .app {
    width: 100%;
    max-width: 700px;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Header */
  .header {
    margin-bottom: 3rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 2rem;
  }

  .eyebrow {
    font-family: var(--ff-mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--accent2);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  .big-title {
    font-family: var(--ff-display);
    font-size: clamp(4rem, 12vw, 7rem);
    line-height: 0.9;
    letter-spacing: 0.02em;
    color: var(--text);
    display: flex;
    align-items: baseline;
    gap: 0.2em;
  }

  .big-title .count-num {
    color: var(--accent);
    font-size: clamp(5rem, 16vw, 9rem);
    line-height: 1;
    transition: all 0.3s ease;
  }

  .subtitle {
    margin-top: 1rem;
    font-size: 13px;
    color: var(--muted);
    font-weight: 300;
    letter-spacing: 0.03em;
  }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 2.5rem;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .stat {
    background: var(--surface);
    padding: 1rem 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .stat-label {
    font-family: var(--ff-mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .stat-value {
    font-family: var(--ff-display);
    font-size: 2rem;
    letter-spacing: 0.03em;
    color: var(--text);
    line-height: 1;
  }

  .stat-value.accent { color: var(--accent); }
  .stat-value.muted { color: var(--muted); }

  /* Progress bar */
  .progress-wrap {
    margin-bottom: 2.5rem;
    animation: fadeUp 0.6s 0.15s ease both;
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    font-family: var(--ff-mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .progress-track {
    height: 3px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: visible;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 99px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    right: -1px;
    top: 50%;
    transform: translateY(-50%);
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--accent2);
    opacity: var(--dot-opacity, 0);
    transition: opacity 0.3s;
  }

  /* Grid */
  .grid-section {
    animation: fadeUp 0.6s 0.2s ease both;
  }

  .grid-label {
    font-family: var(--ff-mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .grid-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 5px;
  }

  .day {
    aspect-ratio: 1;
    border-radius: 6px;
    border: 1px solid var(--border);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--ff-mono);
    font-size: 10px;
    color: var(--muted);
    font-weight: 400;
    transition: border-color 0.15s, background 0.15s, color 0.15s, transform 0.1s;
    position: relative;
    background: var(--surface);
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .day:hover {
    border-color: var(--border2);
    color: var(--text);
    transform: scale(1.08);
    z-index: 2;
  }

  .day:active {
    transform: scale(0.95);
  }

  .day.done {
    background: var(--done-bg);
    border-color: var(--done-bg);
    color: var(--done-text);
    font-weight: 500;
  }

  .day.done::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: rgba(255,255,255,0.15);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .day.done:hover::after { opacity: 1; }

  /* Pop animation on check */
  @keyframes pop {
    0% { transform: scale(1); }
    40% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }
  .day.popping { animation: pop 0.2s ease; }

  /* Footer */
  .footer {
    margin-top: 2.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    animation: fadeUp 0.6s 0.25s ease both;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }

  .footer-msg {
    font-size: 12px;
    color: var(--muted);
    font-weight: 300;
  }

  .footer-msg span {
    color: var(--accent);
    font-weight: 500;
  }

  .btn-reset {
    font-family: var(--ff-mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 99px;
    cursor: pointer;
    text-transform: uppercase;
    transition: border-color 0.15s, color 0.15s;
  }

  .btn-reset:hover {
    border-color: var(--border2);
    color: var(--text);
  }

  /* Completion banner */
  .banner {
    display: none;
    margin-bottom: 2rem;
    background: var(--done-bg);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    align-items: center;
    justify-content: space-between;
    animation: fadeUp 0.4s ease both;
  }

  .banner.visible { display: flex; }

  .banner-text {
    font-family: var(--ff-display);
    font-size: 1.6rem;
    letter-spacing: 0.05em;
    color: var(--done-text);
  }

  .banner-sub {
    font-size: 12px;
    color: rgba(10,10,10,0.6);
    margin-top: 2px;
    font-weight: 300;
  }

  .banner-icon {
    font-size: 2rem;
  }

  @media (max-width: 480px) {
    body { padding: 2rem 1rem 3rem; }
    .grid { gap: 4px; }
    .day { font-size: 9px; border-radius: 5px; }
    .stats-row { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>
<div class="app">

  <header class="header">
    <div class="eyebrow">Internship Tracker</div>
    <div class="big-title">
      <span class="count-num" id="remaining-big">100</span>
      <span>DAYS</span>
    </div>
    <div class="subtitle" id="subtitle-text">remaining in your internship</div>
  </header>

  <div class="stats-row">
    <div class="stat">
      <span class="stat-label">Completed</span>
      <span class="stat-value accent" id="stat-done">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">Remaining</span>
      <span class="stat-value" id="stat-left">100</span>
    </div>
    <div class="stat">
      <span class="stat-label">Progress</span>
      <span class="stat-value muted" id="stat-pct">0%</span>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-meta">
      <span>0</span>
      <span id="pct-label">0%</span>
      <span>100</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="banner" id="banner">
    <div>
      <div class="banner-text">ALL DONE.</div>
      <div class="banner-sub">Congrats — 100 days completed.</div>
    </div>
    <div class="banner-icon">🎓</div>
  </div>

  <div class="grid-section">
    <div class="grid-label">All days</div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="footer">
    <span class="footer-msg" id="footer-msg">Click a day to mark it done</span>
    <button class="btn-reset" id="btn-reset">Reset</button>
  </div>

</div>

<script>
  const TOTAL = 100;
  const KEY = 'internship_v2';
  let done = new Set();

  function load() {
    try {
      const s = localStorage.getItem(KEY);
      if (s) done = new Set(JSON.parse(s));
    } catch(e) {}
  }

  function save() {
    try { localStorage.setItem(KEY, JSON.stringify([...done])); } catch(e) {}
  }

  function msgs(n) {
    if (n === 0) return 'Click a day to mark it done';
    if (n < 10) return `Great start — keep going`;
    if (n < 25) return `Building momentum`;
    if (n < 50) return `Almost halfway there`;
    if (n === 50) return `Halfway. You've got this.`;
    if (n < 75) return `More than halfway done`;
    if (n < 90) return `The finish line is in sight`;
    if (n < 100) return `Almost there — just ${TOTAL - n} left`;
    return `You did it. All 100 days.`;
  }

  function render() {
    const n = done.size;
    const pct = Math.round(n / TOTAL * 100);
    const left = TOTAL - n;

    document.getElementById('remaining-big').textContent = left;
    document.getElementById('subtitle-text').textContent = left === 1 ? 'day remaining' : left === 0 ? 'days — internship complete!' : 'days remaining in your internship';
    document.getElementById('stat-done').textContent = n;
    document.getElementById('stat-left').textContent = left;
    document.getElementById('stat-pct').textContent = pct + '%';
    document.getElementById('pct-label').textContent = pct + '%';

    const fill = document.getElementById('progress-fill');
    fill.style.width = pct + '%';
    fill.style.setProperty('--dot-opacity', n > 0 ? '1' : '0');

    document.getElementById('footer-msg').innerHTML = n > 0
      ? `<span>${n}</span> day${n===1?'':'s'} checked off — ${msgs(n)}`
      : msgs(n);

    document.getElementById('banner').classList.toggle('visible', n === TOTAL);
  }

  function buildGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    for (let i = 1; i <= TOTAL; i++) {
      const el = document.createElement('div');
      el.className = 'day' + (done.has(i) ? ' done' : '');
      el.textContent = i;
      el.dataset.day = i;
      el.addEventListener('click', () => {
        const d = parseInt(el.dataset.day);
        if (done.has(d)) {
          done.delete(d);
          el.classList.remove('done');
        } else {
          done.add(d);
          el.classList.add('done');
          el.classList.add('popping');
          el.addEventListener('animationend', () => el.classList.remove('popping'), { once: true });
        }
        save();
        render();
      });
      grid.appendChild(el);
    }
  }

  document.getElementById('btn-reset').addEventListener('click', () => {
    if (!confirm('Reset all days?')) return;
    done.clear();
    save();
    document.querySelectorAll('.day.done').forEach(el => el.classList.remove('done'));
    render();
  });

  load();
  buildGrid();
  render();
</script>
</body>
</html>
